name: CodeQL

on:
  push:
  pull_request:
  schedule:
    # Run at 00:00 on Monday
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      # GitHub checkout clones the repo into the runner
      - uses: actions/checkout@v4
      # Initialize CodeQL for JavaScript/TypeScript analysis
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
      # Automatically build the codebase for analysis
      - uses: github/codeql-action/autobuild@v3
      # Run the CodeQL analysis
      - uses: github/codeql-action/analyze@v3
